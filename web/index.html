<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkers AI</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      background: #0d0f15;
      color: #e0e0e0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }
    #main-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
    }
    #top-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      background: rgba(12, 14, 20, 0.72);
      backdrop-filter: blur(10px);
    }
    #board-canvas {
      border-radius: 4px;
    }
    #hud {
      width: 280px;
    }
    #hud h1 {
      margin: 0 0 10px;
      font-size: 20px;
      font-weight: 700;
    }
    #controls, #playback-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }
    select {
      background: #1c2330;
      color: #e5ecf5;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    select:hover {
      background: #222c3d;
    }
    .info-text {
      font-size: 12px;
      color: #a8b5c7;
      margin-top: 5px;
    }
    button {
      background: #1c2330;
      color: #e5ecf5;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #222c3d;
    }
    #status, #tree-status {
      font-size: 14px;
      color: #d7e5ff;
      line-height: 1.5;
      min-height: 20px;
    }
    #tree-canvas {
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>

  <div id="main-container">
    <div id="top-container">
        <canvas id="board-canvas" width="320" height="320"></canvas>
        <div id="hud">
          <h1>Checkers AI</h1>
          <div id="controls">
            <button id="newGame">New Game</button>
          </div>
          <div style="margin-bottom: 10px;">
            <label for="algorithm">Algorithm:</label>
            <select id="algorithm">
              <option value="minimax">Minimax</option>
              <option value="alphabeta" selected>Alpha-Beta Pruning</option>
            </select>
            <div class="info-text" id="algorithmInfo">Optimized search with pruning</div>
          </div>
          <div id="status">Welcome! Select algorithm and click "New Game".</div>
          <hr>
          <div id="tree-status"></div>
          <div id="playback-controls">
             <button id="play">▶</button>
             <button id="pause">⏸</button>
             <button id="stepBack">←</button>
             <button id="stepFwd">→</button>
          </div>
        </div>
    </div>
    <canvas id="tree-canvas" width="740" height="450"></canvas>
  </div>

  <script>
    const boardCanvas = document.getElementById("board-canvas");
    const boardCtx = boardCanvas.getContext("2d");
    const treeCanvas = document.getElementById("tree-canvas");
    const treeCtx = treeCanvas.getContext("2d");

    const SQUARE_SIZE = boardCanvas.width / 8;

    let gameId = null;
    let board = null;
    let currentTurn = null;
    let winner = null;
    let selectedPiece = null;
    let validMoves = [];
    let isDragging = false;
    let dragPos = { x: 0, y: 0 };
    let currentAlgorithm = 'alphabeta';
    let currentDepth = 3;

    // Tree and animation state
    let lastTree = null;
    let animationFrames = [];
    let frameIndex = 0;
    let isPlaying = false;
    let lastTick = performance.now();
    let frameDelay = 80; // ms

    const colors = {
      boardLight: "#f6e9d5",
      boardDark: "#8b5a2b",
      redPiece: "#d63c24",
      blackPiece: "#1c1c1c",
      king: "#fbc02d",
      validMove: "rgba(46, 125, 50, 0.5)",
      selected: "rgba(255, 193, 7, 0.5)",
      treeBg: "#0d0f15",
      current: "#fbc02d",
      visited: "#f5d77a",
      pruned: "#2f3542",
      unvisited: "#5a6475",
    };

    async function newGame() {
      try {
        const algorithm = document.getElementById("algorithm").value;
        const response = await fetch("/api/game", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            algorithm: algorithm,
            depth: 3
          })
        });
        const data = await response.json();
        gameId = data.game_id;
        currentAlgorithm = data.algorithm;
        currentDepth = data.depth;
        lastTree = null;
        animationFrames = [];
        frameIndex = 0;
        isPlaying = false;
        await updateGameState();
        const algoName = currentAlgorithm === 'minimax' ? 'Minimax' : 'Alpha-Beta Pruning';
        document.getElementById("status").textContent = `New game started (${algoName}). Red's turn.`;
        document.getElementById("tree-status").textContent = "AI analysis will appear here.";
        drawTree();
      } catch (error) {
        console.error("Error starting new game:", error);
      }
    }

    async function updateGameState() {
      if (!gameId) return;
      try {
        const response = await fetch(`/api/game/${gameId}`);
        const data = await response.json();
        board = data.board;
        currentTurn = data.current_turn;
        winner = data.winner;
        drawBoard();
        if (winner) {
            document.getElementById("status").textContent = `Game Over! ${winner.charAt(0).toUpperCase() + winner.slice(1)} wins.`;
        } else if (currentTurn === 'black') {
            document.getElementById("status").textContent = "Bot is thinking...";
            setTimeout(botMove, 500);
        }
      } catch (error) {
        console.error("Error fetching game state:", error);
      }
    }

    async function playMove(startPos, endPos) {
        try {
            const response = await fetch(`/api/game/${gameId}/move`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ start_pos: startPos, end_pos: endPos }),
            });
            if (!response.ok) throw new Error((await response.json()).detail);
            await updateGameState();
        } catch (error) {
            console.error("Error playing move:", error);
            document.getElementById("status").textContent = `Error: ${error.message}`;
        } finally {
            selectedPiece = null;
            validMoves = [];
            isDragging = false;
            drawBoard();
        }
    }

    async function botMove() {
        try {
            const response = await fetch(`/api/game/${gameId}/bot-move`, { method: "POST" });
            const data = await response.json();
            lastTree = data.tree;
            animationFrames = data.tree ? data.tree.frames : [];
            frameIndex = 0;
            isPlaying = true;

            // Log simulation paths for testing
            if (data.simulation_paths && data.simulation_paths.length > 0) {
                console.log("Simulation paths received:", data.simulation_paths);
                console.log(`Branch 1: ${data.simulation_paths[0].moves.length} moves, score: ${data.simulation_paths[0].final_score}`);
                if (data.simulation_paths.length > 1) {
                    console.log(`Branch 2: ${data.simulation_paths[1].moves.length} moves, score: ${data.simulation_paths[1].final_score}`);
                }
            }

            await updateGameState();
            const algoName = data.algorithm === 'minimax' ? 'Minimax' : 'Alpha-Beta';
            const nodesText = data.nodes_explored ? ` (explored ${data.nodes_explored} positions)` : '';
            document.getElementById("status").textContent = `Bot moved using ${algoName}${nodesText}. Your turn.`;
            if (lastTree) {
                showTree();
            }
        } catch (error) {
            console.error("Error getting bot move:", error);
        }
    }

    function drawBoard() {
      boardCtx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
      for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        boardCtx.fillStyle = (r + c) % 2 === 1 ? colors.boardDark : colors.boardLight;
        boardCtx.fillRect(c * SQUARE_SIZE, r * SQUARE_SIZE, SQUARE_SIZE, SQUARE_SIZE);
      }
      if (board) drawPieces();
      drawHighlights();
    }

    function drawPieces() {
      for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        const piece = board[r][c];
        if (piece && !(isDragging && selectedPiece && selectedPiece.row === r && selectedPiece.col === c)) {
            drawSinglePiece(boardCtx, piece, r, c);
        }
      }
    }

    function drawSinglePiece(ctx, piece, row, col, customPos = null) {
        const x = customPos ? customPos.x : col * SQUARE_SIZE + SQUARE_SIZE / 2;
        const y = customPos ? customPos.y : row * SQUARE_SIZE + SQUARE_SIZE / 2;
        const radius = SQUARE_SIZE / 2 - 6;
        ctx.fillStyle = piece.color === 'red' ? colors.redPiece : colors.blackPiece;
        ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
        if (piece.is_king) {
            ctx.fillStyle = colors.king;
            ctx.beginPath(); ctx.arc(x, y, radius / 2, 0, Math.PI * 2); ctx.fill();
        }
    }

    function drawHighlights() {
        if (selectedPiece && !isDragging) {
            boardCtx.fillStyle = colors.selected;
            boardCtx.fillRect(selectedPiece.col * SQUARE_SIZE, selectedPiece.row * SQUARE_SIZE, SQUARE_SIZE, SQUARE_SIZE);
        }
        boardCtx.fillStyle = colors.validMove;
        validMoves.forEach(m => boardCtx.fillRect(m.col * SQUARE_SIZE, m.row * SQUARE_SIZE, SQUARE_SIZE, SQUARE_SIZE));
    }

    function getClickedSquare(event) {
        const rect = boardCanvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        return { row: Math.floor(y / SQUARE_SIZE), col: Math.floor(x / SQUARE_SIZE), x, y };
    }

    function onBoardPointerDown(e) {
        if (winner || currentTurn !== 'red') return;
        const { row, col, x, y } = getClickedSquare(e);
        const piece = board[row] ? board[row][col] : null;
        if (piece && piece.color === currentTurn) {
            selectedPiece = { row, col, piece };
            isDragging = true;
            dragPos = { x, y };
            getValidMoves(row, col);
            drawBoard();
        }
    }

    function onBoardPointerMove(e) {
        if (!isDragging) return;
        const { x, y } = getClickedSquare(e);
        dragPos = { x, y };
        drawBoard();
        drawSinglePiece(boardCtx, selectedPiece.piece, -1, -1, dragPos);
    }

    function onBoardPointerUp(e) {
        if (!isDragging) return;
        const { row, col } = getClickedSquare(e);
        if (validMoves.find(m => m.row === row && m.col === col)) {
            playMove([selectedPiece.row, selectedPiece.col], [row, col]);
        } else {
            selectedPiece = null; validMoves = []; isDragging = false; drawBoard();
        }
    }
    
    function getValidMoves(row, col) {
        validMoves = [];
        const piece = board[row][col];
        if (!piece) return;
        const dir = piece.color === 'red' ? -1 : 1;
        const opponent = piece.color === 'red' ? 'black' : 'red';
        const check = (r, c, isCapture, jumpR, jumpC) => {
            if (r < 0 || r > 7 || c < 0 || c > 7) return;
            const target = board[r][c];
            if (isCapture) {
                if (jumpR < 0 || jumpR > 7 || jumpC < 0 || jumpC > 7) return;
                if (target && target.color === opponent && !board[jumpR][jumpC]) validMoves.push({row: jumpR, col: jumpC});
            } else if (!target) validMoves.push({row: r, col: c});
        };
        [dir, -dir].forEach(d => {
            if (d === -dir && !piece.is_king) return;
            check(row + d, col - 1, false); check(row + d, col + 1, false);
            check(row + d, col - 1, true, row + 2*d, col - 2);
            check(row + d, col + 1, true, row + 2*d, col + 2);
        });
    }

    // --- Tree Viewer Logic ---
    let treePositions = new Map();
    const treeViewport = { scale: 0.5, offsetX: 0, offsetY: 0, dragging: false, dragStart: {x:0,y:0}, startOffset: {x:0,y:0} };

    function showTree() {
        if (!lastTree) return;
        treePositions = layoutTree(lastTree);
        fitTreeView();
        drawTree();
    }

    function layoutTree(tree) {
      const children = new Map();
      tree.nodes.forEach(n => children.set(n.id, []));
      tree.edges.forEach(e => children.get(e.from).push(e.to));
      const subtreeSize = new Map();
      function count(id) {
        const kids = children.get(id) || [];
        if (!kids.length) { subtreeSize.set(id, 1); return 1; }
        let total = kids.reduce((acc, c) => acc + count(c), 0);
        subtreeSize.set(id, total); return total;
      }
      count(0);
      const pos = new Map();
      function assign(id, depth, left, right) {
        pos.set(id, { x: left + (right - left) / 2, y: depth * 80 });
        const kids = children.get(id) || [];
        if (!kids.length) return;
        const total = kids.reduce((acc, c) => acc + subtreeSize.get(c), 0);
        let cur = left;
        for (const c of kids) {
          const share = (right - left) * (subtreeSize.get(c) / total);
          assign(c, depth + 1, cur, cur + share);
          cur += share;
        }
      }
      assign(0, 0, 0, 4000);
      return pos;
    }

    function fitTreeView() {
      if (!treePositions.size) return;
      const xs = [...treePositions.values()].map(p => p.x);
      const ys = [...treePositions.values()].map(p => p.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const spanX = maxX - minX || 1, spanY = maxY - minY || 1;
      const pad = 50;
      const scaleX = (treeCanvas.width - pad*2) / spanX, scaleY = (treeCanvas.height - pad*2) / spanY;
      treeViewport.scale = Math.min(scaleX, scaleY) * 0.95;
      const centerX = (minX + maxX) / 2, centerY = (minY + maxY) / 2;
      treeViewport.offsetX = treeCanvas.width/2 - centerX*treeViewport.scale;
      treeViewport.offsetY = treeCanvas.height/2 - centerY*treeViewport.scale;
    }

    function drawTree() {
        treeCtx.fillStyle = colors.treeBg;
        treeCtx.fillRect(0, 0, treeCanvas.width, treeCanvas.height);
        if (!lastTree) return;

        treeCtx.save();
        treeCtx.translate(treeViewport.offsetX, treeViewport.offsetY);
        treeCtx.scale(treeViewport.scale, treeViewport.scale);

        const visited = new Set();
        const current = animationFrames[frameIndex] || null;
        for (let i = 0; i <= frameIndex; i++) {
            const f = animationFrames[i];
            if (f && f.edge && f.edge[0] != null && f.edge[1] != null) visited.add(`${f.edge[0]}-${f.edge[1]}`);
        }

        treeCtx.lineWidth = 2 / treeViewport.scale;
        treeCtx.lineCap = "round";

        for (const e of lastTree.edges) {
            const from = treePositions.get(e.from), to = treePositions.get(e.to);
            if (!from || !to) continue;
            const key = `${e.from}-${e.to}`;
            const isCurrent = current && current.edge && key === `${current.edge[0]}-${current.edge[1]}`;
            
            let color = colors.unvisited;
            if (e.is_pruned) color = colors.pruned;
            else if (isCurrent) color = colors.current;
            else if (visited.has(key)) color = colors.visited;
            
            treeCtx.strokeStyle = color;
            treeCtx.beginPath(); treeCtx.moveTo(from.x, from.y); treeCtx.lineTo(to.x, to.y); treeCtx.stroke();
        }
        treeCtx.restore();
        updateTreeStatus();
    }

    function updateTreeStatus() {
        const statusEl = document.getElementById("tree-status");
        if (!animationFrames.length) {
            statusEl.textContent = "AI analysis will appear here.";
            return;
        }
        const current = animationFrames[frameIndex] || null;
        const frameText = `Frame: ${Math.min(frameIndex + 1, animationFrames.length)} / ${animationFrames.length}`;
        if (current && current.edge) {
            const child = lastTree.nodes.find(n => n.id === current.edge[1]);
            const move = child?.move_notation;
            const moveText = move ? `${move.from} → ${move.to}` : "Root";
            const scoreText = current.node_score == null ? "pending" : `${current.node_score}`;
            statusEl.innerHTML = `${frameText}<br>Branch: ${moveText} | Eval: ${scoreText}`;
        } else {
            statusEl.textContent = frameText;
        }
    }
    
    function tick(now) {
        if (isPlaying && animationFrames.length && now - lastTick > frameDelay) {
            lastTick = now;
            if (frameIndex < animationFrames.length - 1) {
                frameIndex++;
                drawTree();
            } else {
                isPlaying = false;
            }
        }
        requestAnimationFrame(tick);
    }

    // Event Listeners
    document.getElementById("newGame").addEventListener("click", newGame);
    document.getElementById("play").onclick = () => isPlaying = true;
    document.getElementById("pause").onclick = () => isPlaying = false;
    document.getElementById("stepFwd").onclick = () => { isPlaying = false; frameIndex = Math.min(animationFrames.length - 1, frameIndex + 1); drawTree(); };
    document.getElementById("stepBack").onclick = () => { isPlaying = false; frameIndex = Math.max(0, frameIndex - 1); drawTree(); };

    // Algorithm selector change handler
    document.getElementById("algorithm").addEventListener("change", function(e) {
      const algo = e.target.value;
      const infoText = algo === "minimax"
        ? "Classic search exploring all branches"
        : "Optimized search with pruning";
      document.getElementById("algorithmInfo").textContent = infoText;
    });
    
    boardCanvas.addEventListener("pointerdown", onBoardPointerDown);
    boardCanvas.addEventListener("pointermove", onBoardPointerMove);
    boardCanvas.addEventListener("pointerup", onBoardPointerUp);
    boardCanvas.addEventListener("pointerleave", () => { if (isDragging) { isDragging = false; selectedPiece = null; validMoves = []; drawBoard(); }});

    treeCanvas.addEventListener("wheel", e => { e.preventDefault(); const { offsetX, offsetY, deltaY } = e; const zoom = Math.exp(-deltaY * 0.001); const wx = (offsetX - treeViewport.offsetX) / treeViewport.scale; const wy = (offsetY - treeViewport.offsetY) / treeViewport.scale; treeViewport.scale *= zoom; treeViewport.offsetX = offsetX - wx * treeViewport.scale; treeViewport.offsetY = offsetY - wy * treeViewport.scale; drawTree(); }, { passive: false });
    treeCanvas.addEventListener("pointerdown", e => { treeViewport.dragging = true; treeViewport.dragStart = { x: e.clientX, y: e.clientY }; treeViewport.startOffset = { x: treeViewport.offsetX, y: treeViewport.offsetY }; treeCanvas.setPointerCapture(e.pointerId); });
    treeCanvas.addEventListener("pointermove", e => { if (!treeViewport.dragging) return; const dx = e.clientX - treeViewport.dragStart.x, dy = e.clientY - treeViewport.dragStart.y; treeViewport.offsetX = treeViewport.startOffset.x + dx; treeViewport.offsetY = treeViewport.startOffset.y + dy; drawTree(); });
    treeCanvas.addEventListener("pointerup", e => { treeViewport.dragging = false; treeCanvas.releasePointerCapture(e.pointerId); });

    // Initial setup
    drawBoard();
    drawTree();
    requestAnimationFrame(tick);

  </script>
</body>
</html>
