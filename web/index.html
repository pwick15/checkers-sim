<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Checkers AI</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      background: #0d0f15;
      color: #e0e0e0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #game-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    #main-canvas {
      border: 2px solid #2f3542;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    #hud {
      width: 400px;
      padding: 15px 20px;
      background: rgba(12, 14, 20, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      z-index: 2;
    }
    #hud h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    #hud .meta {
      margin: 6px 0 10px;
      color: #9fb3c8;
      font-size: 14px;
      line-height: 1.4;
    }
    #controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }
    button, .pill {
      background: #1c2330;
      color: #e5ecf5;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #222c3d;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #d7e5ff;
      line-height: 1.5;
      min-height: 40px;
    }
    #tree-viewer-container {
        display: none; /* Initially hidden */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(5px);
        z-index: 10;
        justify-content: center;
        align-items: center;
    }
    #tree-canvas {
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 10px;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <canvas id="main-canvas" width="600" height="600"></canvas>
    <div id="hud">
      <h1>Checkers AI</h1>
      <div class="meta" id="meta"></div>
      <div id="controls">
        <button id="newGame">New Game</button>
        <button id="showTree" disabled>Show AI Tree</button>
      </div>
      <div id="status">Welcome! Click "New Game" to start.</div>
    </div>
  </div>

  <div id="tree-viewer-container">
      <canvas id="tree-canvas"></canvas>
  </div>


  <script>
    const mainCanvas = document.getElementById("main-canvas");
    const mainCtx = mainCanvas.getContext("2d");

    const treeCanvas = document.getElementById("tree-canvas");
    const treeCtx = treeCanvas.getContext("2d");
    const treeContainer = document.getElementById("tree-viewer-container");

    const SQUARE_SIZE = mainCanvas.width / 8;

    let gameId = null;
    let board = null;
    let currentTurn = null;
    let winner = null;
    let selectedPiece = null;
    let validMoves = [];
    let lastTree = null;

    const colors = {
      boardLight: "#f6e9d5",
      boardDark: "#8b5a2b",
      redPiece: "#d63c24",
      blackPiece: "#1c1c1c",
      king: "#fbc02d",
      validMove: "rgba(46, 125, 50, 0.5)",
      selected: "rgba(255, 193, 7, 0.5)",
    };

    async function newGame() {
      try {
        const response = await fetch("/api/game", { method: "POST" });
        const data = await response.json();
        gameId = data.game_id;
        await updateGameState();
        document.getElementById("status").textContent = "New game started. Red's turn.";
        document.getElementById("showTree").disabled = true;
      } catch (error) {
        console.error("Error starting new game:", error);
        document.getElementById("status").textContent = "Error starting game.";
      }
    }

    async function updateGameState() {
      if (!gameId) return;
      try {
        const response = await fetch(`/api/game/${gameId}`);
        const data = await response.json();
        board = data.board;
        currentTurn = data.current_turn;
        winner = data.winner;
        drawBoard();
        if (winner) {
            document.getElementById("status").textContent = `Game Over! ${winner.charAt(0).toUpperCase() + winner.slice(1)} wins.`;
        } else if (currentTurn === 'black') {
            document.getElementById("status").textContent = "Bot is thinking...";
            setTimeout(botMove, 500);
        }
      } catch (error) {
        console.error("Error fetching game state:", error);
      }
    }

    async function playMove(startPos, endPos) {
        try {
            const response = await fetch(`/api/game/${gameId}/move`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ start_pos: startPos, end_pos: endPos }),
            });
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || "Invalid move");
            }
            await updateGameState();
        } catch (error) {
            console.error("Error playing move:", error);
            document.getElementById("status").textContent = `Error: ${error.message}`;
            // Reset selection on invalid move
            selectedPiece = null;
            validMoves = [];
            drawBoard();
        }
    }

    async function botMove() {
        try {
            const response = await fetch(`/api/game/${gameId}/bot-move`, { method: "POST" });
            const data = await response.json();
            lastTree = data.tree;
            await updateGameState();
            document.getElementById("status").textContent = "Bot has moved. Your turn.";
            document.getElementById("showTree").disabled = !lastTree;
        } catch (error) {
            console.error("Error getting bot move:", error);
        }
    }

    function drawBoard() {
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const isDark = (row + col) % 2 === 1;
          mainCtx.fillStyle = isDark ? colors.boardDark : colors.boardLight;
          mainCtx.fillRect(col * SQUARE_SIZE, row * SQUARE_SIZE, SQUARE_SIZE, SQUARE_SIZE);
        }
      }
      if (board) {
        drawPieces();
      }
      drawHighlights();
    }

    function drawPieces() {
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
          const piece = board[row][col];
          if (piece) {
            const x = col * SQUARE_SIZE + SQUARE_SIZE / 2;
            const y = row * SQUARE_SIZE + SQUARE_SIZE / 2;
            const radius = SQUARE_SIZE / 2 - 10;
            
            mainCtx.fillStyle = piece.color === 'red' ? colors.redPiece : colors.blackPiece;
            mainCtx.beginPath();
            mainCtx.arc(x, y, radius, 0, Math.PI * 2);
            mainCtx.fill();

            if (piece.is_king) {
              mainCtx.fillStyle = colors.king;
              mainCtx.beginPath();
              mainCtx.arc(x, y, radius / 2, 0, Math.PI * 2);
              mainCtx.fill();
            }
          }
        }
      }
    }

    function drawHighlights() {
        if (selectedPiece) {
            const { row, col } = selectedPiece;
            mainCtx.fillStyle = colors.selected;
            mainCtx.fillRect(col * SQUARE_SIZE, row * SQUARE_SIZE, SQUARE_SIZE, SQUARE_SIZE);
        }
        mainCtx.fillStyle = colors.validMove;
        validMoves.forEach(move => {
            mainCtx.fillRect(move.col * SQUARE_SIZE, move.row * SQUARE_SIZE, SQUARE_SIZE, SQUARE_SIZE);
        });
    }

    function getClickedSquare(event) {
        const rect = mainCanvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const row = Math.floor(y / SQUARE_SIZE);
        const col = Math.floor(x / SQUARE_SIZE);
        return { row, col };
    }

    function onBoardClick(event) {
        if (winner || currentTurn !== 'red') return;

        const { row, col } = getClickedSquare(event);
        
        const clickedValidMove = validMoves.find(move => move.row === row && move.col === col);

        if (clickedValidMove) {
            playMove([selectedPiece.row, selectedPiece.col], [row, col]);
            selectedPiece = null;
            validMoves = [];
        } else {
            const piece = board[row] ? board[row][col] : null;
            if (piece && piece.color === currentTurn) {
                selectedPiece = { row, col, piece };
                // This is a simplification. The backend will have the true valid moves.
                // For the UI, we'll just highlight some potential moves.
                // A better implementation would fetch valid moves from the backend.
                getValidMoves(row, col);
            } else {
                selectedPiece = null;
                validMoves = [];
            }
        }
        drawBoard();
    }
    
    // This is a temporary client-side estimation of moves for UI feedback.
    // The server remains the source of truth.
    function getValidMoves(row, col) {
        validMoves = [];
        const piece = board[row][col];
        if (!piece) return;

        const dir = piece.color === 'red' ? -1 : 1;
        const opponent = piece.color === 'red' ? 'black' : 'red';

        const checkMove = (r, c) => {
            if (r >= 0 && r < 8 && c >= 0 && c < 8 && !board[r][c]) {
                validMoves.push({row: r, col: c});
            }
        };

        const checkCapture = (r, c, jumpR, jumpC) => {
            if (jumpR >= 0 && jumpR < 8 && jumpC >= 0 && jumpC < 8 &&
                board[r][c] && board[r][c].color === opponent && !board[jumpR][jumpC]) {
                validMoves.push({row: jumpR, col: jumpC});
            }
        };

        // Regular moves
        checkMove(row + dir, col - 1);
        checkMove(row + dir, col + 1);
        if (piece.is_king) {
            checkMove(row - dir, col - 1);
            checkMove(row - dir, col + 1);
        }

        // Captures
        checkCapture(row + dir, col - 1, row + 2 * dir, col - 2);
        checkCapture(row + dir, col + 1, row + 2 * dir, col + 2);
        if (piece.is_king) {
            checkCapture(row - dir, col - 1, row - 2 * dir, col - 2);
            checkCapture(row - dir, col + 1, row - 2 * dir, col + 2);
        }
    }


    // --- Tree Viewer Logic ---
    let treePositions = new Map();
    const treeViewport = { scale: 0.5, offsetX: 0, offsetY: 0 };

    function showTree() {
        if (!lastTree) return;
        treeContainer.style.display = "flex";
        treeCanvas.width = window.innerWidth * 0.9;
        treeCanvas.height = window.innerHeight * 0.9;
        treePositions = layoutTree(lastTree);
        fitTreeView();
        drawTree();
    }

    function layoutTree(tree) {
      const children = new Map();
      tree.nodes.forEach(n => children.set(n.id, []));
      tree.edges.forEach(e => children.get(e.from).push(e.to));

      const subtreeSize = new Map();
      function count(id) {
        const kids = children.get(id) || [];
        if (!kids.length) {
          subtreeSize.set(id, 1);
          return 1;
        }
        let total = 0;
        for (const c of kids) total += count(c);
        subtreeSize.set(id, Math.max(1, total));
        return subtreeSize.get(id);
      }
      count(0);

      const pos = new Map();
      function assign(id, depth, left, right) {
        const x = left + (right - left) / 2;
        const y = depth * 120;
        pos.set(id, { x, y });
        const kids = children.get(id) || [];
        if (!kids.length) return;
        const span = right - left;
        const total = kids.reduce((acc, c) => acc + (subtreeSize.get(c) || 1), 0);
        let cur = left;
        for (const c of kids) {
          const share = span * ((subtreeSize.get(c) || 1) / total);
          assign(c, depth + 1, cur, cur + share);
          cur += share;
        }
      }
      assign(0, 0, 0, 3000);
      return pos;
    }

    function fitTreeView() {
      if (!treePositions.size) return;
      const xs = [...treePositions.values()].map(p => p.x);
      const ys = [...treePositions.values()].map(p => p.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const spanX = maxX - minX || 1;
      const spanY = maxY - minY || 1;
      const pad = 40;
      const scaleX = (treeCanvas.width - pad * 2) / spanX;
      const scaleY = (treeCanvas.height - pad * 2) / spanY;
      treeViewport.scale = Math.min(scaleX, scaleY) * 0.9;
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      treeViewport.offsetX = treeCanvas.width / 2 - centerX * treeViewport.scale;
      treeViewport.offsetY = treeCanvas.height / 3 - centerY * treeViewport.scale;
    }

    function drawTree() {
        treeCtx.fillStyle = '#0d0f15';
        treeCtx.fillRect(0, 0, treeCanvas.width, treeCanvas.height);
        if (!lastTree) return;

        treeCtx.save();
        treeCtx.translate(treeViewport.offsetX, treeViewport.offsetY);
        treeCtx.scale(treeViewport.scale, treeViewport.scale);

        treeCtx.lineWidth = 2 / treeViewport.scale;
        treeCtx.lineCap = "round";

        for (const e of lastTree.edges) {
            const from = treePositions.get(e.from);
            const to = treePositions.get(e.to);
            if (!from || !to) continue;
            
            treeCtx.strokeStyle = e.is_pruned ? '#2f3542' : '#5a6475';
            treeCtx.beginPath();
            treeCtx.moveTo(from.x, from.y);
            treeCtx.lineTo(to.x, to.y);
            treeCtx.stroke();
        }
        treeCtx.restore();
    }


    // Event Listeners
    document.getElementById("newGame").addEventListener("click", newGame);
    document.getElementById("showTree").addEventListener("click", showTree);
    mainCanvas.addEventListener("click", onBoardClick);
    treeContainer.addEventListener("click", (e) => {
        if (e.target === treeContainer) {
            treeContainer.style.display = "none";
        }
    });


    // Initial setup
    drawBoard();

  </script>
</body>
</html>
